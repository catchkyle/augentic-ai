backend:
  name: github
  repo: cora-catchadvisors/augentic-ai
  branch: main
  # For local development, you can use: name: test-repo

# Enable editorial workflow for draft/review/ready publishing states
# This creates pull requests for drafts instead of direct commits to main
publish_mode: editorial_workflow

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Slug"
        name: "slug"
        widget: "string"
        hint: "URL-friendly identifier (e.g., 'qwen35-local-ai-business-leaders')"
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "MMMM D, YYYY"
        date_format: "MMMM D, YYYY"
        time_format: false
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "AI Strategy"
          - "Revenue Operations"
          - "Sales Automation"
          - "AI Implementation"
          - "Business Innovation"
      - label: "Description"
        name: "description"
        widget: "text"
        hint: "Brief summary shown in blog listings and meta tags"
      - label: "Reading Time"
        name: "reading_time"
        widget: "string"
        default: "5 min read"
        hint: "e.g., '5 min read'"
      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Display as featured post on blog page"
      - label: "X Credit"
        name: "x_credit"
        widget: "string"
        required: false
        hint: "Optional attribution or inspiration credit (e.g., 'Inspired by @user on X')"
      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Main content of the blog post (HTML tags allowed)"

  - name: "case-studies"
    label: "Case Studies"
    folder: "content/case-studies"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Slug"
        name: "slug"
        widget: "string"
        hint: "URL-friendly identifier (e.g., 'acme-corp-ai-transformation')"
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Case study title"
      - label: "Client"
        name: "client"
        widget: "string"
        hint: "Client or company name"
      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "MMMM D, YYYY"
        date_format: "MMMM D, YYYY"
        time_format: false
      - label: "Description"
        name: "description"
        widget: "text"
        hint: "Brief summary shown in case study listings and meta tags"
      - label: "Challenge"
        name: "challenge"
        widget: "markdown"
        hint: "The problem or challenge the client faced"
      - label: "Solution"
        name: "solution"
        widget: "markdown"
        hint: "How Augentic AI solved the challenge"
      - label: "Results"
        name: "results"
        widget: "markdown"
        hint: "The outcomes and impact achieved"
      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Display as featured case study"
